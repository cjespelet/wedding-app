<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="2000mm"
     height="2000mm"
     viewBox="0 0 2000 2000"
     preserveAspectRatio="xMidYMid meet">
  <title>JJ wedding backdrop 2m by 2m</title>
  <desc>Step-and-repeat. Text: Allura or Great Vibes. Outline text for print if required.</desc>

  <defs>
    <!-- Rose gold text (warm peach-copper like reference) -->
    <linearGradient id="roseText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8B5A5"/>
      <stop offset="45%" stop-color="#D49A89"/>
      <stop offset="100%" stop-color="#B87A6A"/>
    </linearGradient>
    <linearGradient id="roseAccent" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#E5AE9E"/>
      <stop offset="100%" stop-color="#C47A6C"/>
    </linearGradient>

    <!-- Gold ring volume: highlight top-left, shadow bottom-right -->
    <radialGradient id="goldRingA" gradientUnits="userSpaceOnUse" cx="138" cy="278" r="72">
      <stop offset="0%" stop-color="#FFFAE8"/>
      <stop offset="22%" stop-color="#FFE87A"/>
      <stop offset="48%" stop-color="#E4B422"/>
      <stop offset="78%" stop-color="#A67C00"/>
      <stop offset="100%" stop-color="#6B4A12"/>
    </radialGradient>
    <radialGradient id="goldRingB" gradientUnits="userSpaceOnUse" cx="232" cy="275" r="72">
      <stop offset="0%" stop-color="#FFFCEE"/>
      <stop offset="20%" stop-color="#FFEC8B"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="82%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C3D08"/>
    </radialGradient>
    <linearGradient id="goldRim" gradientUnits="userSpaceOnUse" x1="100" y1="265" x2="270" y2="340">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#FFF4A3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="ringSoftShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#3D2800" flood-opacity="0.35"/>
    </filter>

    <!-- Motif: wide script + dense sparkles + overlapping gold rings -->
    <symbol id="jj-motif" viewBox="0 0 400 460">
      <g fill="url(#roseAccent)">
        <!-- Sparkles and dots (denser near text like reference) -->
        <path d="M48 132 L52 144 L64 149 L52 154 L48 166 L44 154 L32 149 L44 144 Z"/>
        <path d="M72 88 L74 94 L80 96 L74 98 L72 104 L70 98 L64 96 L70 94 Z"/>
        <path d="M328 118 L332 128 L342 132 L332 136 L328 146 L324 136 L314 132 L324 128 Z"/>
        <path d="M352 78 L354 84 L360 86 L354 88 L352 94 L350 88 L344 86 L350 84 Z"/>
        <path d="M285 62 L288 70 L296 73 L288 76 L285 84 L282 76 L274 73 L282 70 Z"/>
        <path d="M118 58 L120 64 L126 66 L120 68 L118 74 L116 68 L110 66 L116 64 Z"/>
        <path d="M218 42 L220 48 L226 50 L220 52 L218 58 L216 52 L210 50 L216 48 Z"/>
        <circle cx="95" cy="108" r="3"/>
        <circle cx="118" cy="72" r="2.3"/>
        <circle cx="268" cy="96" r="2.8"/>
        <circle cx="312" cy="112" r="2.2"/>
        <circle cx="340" cy="138" r="2.5"/>
        <circle cx="58" cy="168" r="2"/>
        <circle cx="200" cy="48" r="2.4"/>
        <circle cx="245" cy="52" r="2"/>
        <!-- Hearts -->
        <path d="M128 68 C128 60 136 55 144 60 C152 55 160 60 160 68 C160 78 144 94 144 94 C144 94 128 78 128 68 Z"/>
        <path d="M248 76 C248 70 254 66 260 70 C266 66 272 70 272 76 C272 84 260 96 260 96 C260 96 248 84 248 76 Z"/>
        <path d="M92 152 C92 147 97 144 102 147 C107 144 112 147 112 152 C112 158 102 168 102 168 C102 168 92 158 92 152 Z" transform="scale(0.75) translate(268,48)"/>
        <path d="M188 62 C188 57 193 54 198 57 C203 54 208 57 208 62 C208 68 198 78 198 78 C198 78 188 68 188 62 Z" transform="scale(0.9)"/>
      </g>

      <text x="200" y="188" text-anchor="middle"
            font-family="Allura, Great Vibes, Segoe Script, Brush Script MT, cursive"
            font-size="132"
            letter-spacing="6"
            fill="url(#roseText)">J  &amp;  J</text>

      <g filter="url(#ringSoftShadow)">
        <!-- Back ring (right), then front (left) for overlap -->
        <ellipse cx="228" cy="312" rx="50" ry="62" fill="none" stroke="url(#goldRingB)" stroke-width="17"
                 transform="rotate(11 228 312)"/>
        <ellipse cx="158" cy="318" rx="50" ry="62" fill="none" stroke="url(#goldRingA)" stroke-width="17"
                 transform="rotate(-13 158 318)"/>
        <ellipse cx="228" cy="312" rx="50" ry="62" fill="none" stroke="url(#goldRim)" stroke-width="6"
                 transform="rotate(11 228 312)" opacity="0.75"/>
        <ellipse cx="158" cy="318" rx="50" ry="62" fill="none" stroke="url(#goldRim)" stroke-width="6"
                 transform="rotate(-13 158 318)" opacity="0.85"/>
      </g>
    </symbol>
  </defs>

  <rect width="2000" height="2000" fill="#FFFFFF"/>

  <g id="step-repeat">
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1000 1010) scale(2.2) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(250 250) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(750 250) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1250 250) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1750 250) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(250 1750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(750 1750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1250 1750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1750 1750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(250 750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(250 1250) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1750 750) scale(0.56) translate(-200 -230)"/>
    <use xlink:href="#jj-motif" href="#jj-motif" transform="translate(1750 1250) scale(0.56) translate(-200 -230)"/>
  </g>
</svg>
