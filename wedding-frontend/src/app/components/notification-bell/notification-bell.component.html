<ion-button
  fill="clear"
  class="bell-btn"
  (click)="openModal()"
  [attr.aria-label]="'Notificaciones' + (unreadCount ? ', ' + unreadCount + ' sin leer' : '')"
>
  <ion-icon slot="icon-only" name="notifications-outline"></ion-icon>
  <span class="bell-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
</ion-button>

<ion-modal [isOpen]="modalOpen" (didDismiss)="closeModal()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Notificaciones</ion-title>
        <ion-buttons slot="end">
          <ion-button *ngIf="unreadCount > 0" fill="clear" (click)="markAllRead()">Marcar leídas</ion-button>
          <ion-button (click)="closeModal()">Cerrar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="notif-modal-content">
      <div *ngIf="loading && notifications.length === 0" class="ion-padding ion-text-center">
        <ion-spinner name="crescent"></ion-spinner>
      </div>

      <ion-list *ngIf="notifications.length > 0">
        <ion-item
          *ngFor="let n of notifications"
          button
          detail="true"
          lines="full"
          [class.notif-unread]="!n.readAt"
          (click)="markOneRead(n)"
        >
          <ion-label>
            <h3>
              <strong>{{ displayActor(n) }}</strong>
              {{ n.label }}
            </h3>
            <p>{{ n.createdAt | date : 'short' }}</p>
          </ion-label>
        </ion-item>
      </ion-list>

      <p *ngIf="!loading && notifications.length === 0" class="ion-padding ion-text-center empty-notif">
        No tenés notificaciones todavía.
      </p>

      <ion-infinite-scroll *ngIf="hasMore && notifications.length > 0" threshold="100px" (ionInfinite)="onInfinite($event)">
        <ion-infinite-scroll-content loadingSpinner="crescent" loadingText="Más..."></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </ion-content>
  </ng-template>
</ion-modal>
