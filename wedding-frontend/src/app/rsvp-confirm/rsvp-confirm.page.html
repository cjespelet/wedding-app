<ion-header class="auth-header">
  <ion-toolbar>
    <ion-title>Confirmar presencia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-list lines="full">
      <ion-item>
        <ion-label position="stacked">Adultos que asisten</ion-label>
        <ion-input type="number" formControlName="adults"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Menores que asisten</ion-label>
        <ion-input type="number" formControlName="minors"></ion-input>
      </ion-item>
    </ion-list>

    <ion-button expand="block" type="submit" class="ion-margin-top">
      Confirmar presencia
    </ion-button>
  </form>
</ion-content>
