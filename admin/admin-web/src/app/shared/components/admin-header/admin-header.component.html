<header class="admin-header d-flex justify-content-between align-items-center">
  <div class="d-flex align-items-center gap-2">
    <span class="logo">Wedding Admin</span>
    @if (sectionName()) {
      <span class="section-name">{{ sectionName() }}</span>
    }
  </div>
  @if (user(); as u) {
    <div class="d-flex align-items-center gap-3">
      <a routerLink="/wedding" routerLinkActive="active" class="header-settings-link" title="Configuración">
        <i class="fa-solid fa-gear"></i>
      </a>
      <span class="user-name">Conectado como {{ u.name }}</span>
      <button class="btn btn-outline-light btn-sm" type="button" (click)="onLogout()">Logout</button>
    </div>
  }
</header>
