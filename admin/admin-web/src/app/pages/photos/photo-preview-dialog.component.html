<h2 mat-dialog-title></h2>
<div mat-dialog-content class="preview-dialog-content">
  <img [src]="data.largeUrl || data.squareUrl" alt="Foto" />
</div>
<div mat-dialog-actions align="end">
  <button type="button" class="btn btn-secondary me-2" (click)="download()">Descargar</button>
  <button type="button" class="btn btn-secondary me-2" (click)="print()">Imprimir</button>
  <button type="button" class="btn btn-primary" (click)="close()">Cerrar</button>
</div>
