<h2 mat-dialog-title>Invitado</h2>
<div mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="fullName" placeholder="Ej. Flia Rocha o Juan Pérez" />
    </mat-form-field>

    <div class="row-fields">
      <mat-form-field appearance="outline">
        <mat-label>Mayores de 17</mat-label>
        <input matInput type="number" formControlName="adultsCount" min="0" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Menores de 17</mat-label>
        <input matInput type="number" formControlName="minorsCount" min="0" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Usuario (para @ en fotos)</mat-label>
      <input matInput formControlName="username" placeholder="Ej. fliarocha" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Código de acceso (4 dígitos)</mat-label>
      <input matInput formControlName="accessCode" type="text" inputmode="numeric" maxlength="4" placeholder="Se asigna al registrar" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Grupo / familia</mat-label>
      <input matInput formControlName="familyGroup" />
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions align="end">
  <button type="button" class="btn btn-secondary" mat-dialog-close>Cancelar</button>
  <button type="button" class="btn btn-primary" (click)="save()">Guardar</button>
</div>
